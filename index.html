<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyOutstation - Premium Outstation Cab Service Delhi</title>
    <meta name="description" content="Book outstation cabs from Delhi. Verified drivers, fixed fares, no hidden charges. Delhi to Manali, Shimla, Chandigarh, Jaipur & more." />
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
      // ============================================
      // EasyOutstation Content Protection
      // © 2025 EasyOutstation. All Rights Reserved.
      // Unauthorized copying strictly prohibited.
      // ============================================

      // 1. Disable right click
      document.addEventListener("contextmenu", function(e) {
        e.preventDefault();
        return false;
      });

      // 2. Disable keyboard shortcuts for dev tools & copy
      document.addEventListener("keydown", function(e) {
        // F12
        if (e.key === "F12") { e.preventDefault(); return false; }
        // Ctrl/Cmd + Shift + I (DevTools)
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === "I") { e.preventDefault(); return false; }
        // Ctrl/Cmd + Shift + J (Console)
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === "J") { e.preventDefault(); return false; }
        // Ctrl/Cmd + Shift + C (Inspector)
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === "C") { e.preventDefault(); return false; }
        // Ctrl/Cmd + U (View Source)
        if ((e.ctrlKey || e.metaKey) && e.key === "u") { e.preventDefault(); return false; }
        // Ctrl/Cmd + S (Save page)
        if ((e.ctrlKey || e.metaKey) && e.key === "s") { e.preventDefault(); return false; }
      });

      // 3. Disable text selection on non-input elements
      document.addEventListener("selectstart", function(e) {
        if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return true;
        e.preventDefault();
        return false;
      });

      // 4. Disable drag on images
      document.addEventListener("dragstart", function(e) {
        if (e.target.tagName === "IMG") { e.preventDefault(); return false; }
      });

      // 5. Console warning for developers
      setTimeout(function() {
        console.log("%c⛔ STOP!", "color: red; font-size: 40px; font-weight: bold;");
        console.log("%cThis website is the intellectual property of EasyOutstation.", "color: #1e40af; font-size: 16px;");
        console.log("%c© 2025 EasyOutstation. All Rights Reserved. Unauthorized copying or reproduction is strictly prohibited and may result in legal action.", "color: #374151; font-size: 13px;");
      }, 1000);
    </script>
    <style>
      /* Disable text selection site-wide except inputs */
      body {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }
      input, textarea, [contenteditable] {
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
      }
      /* Disable image dragging */
      img {
        -webkit-user-drag: none;
        user-drag: none;
        pointer-events: none;
      }
      /* Re-enable pointer events for clickable images */
      a img, button img {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
