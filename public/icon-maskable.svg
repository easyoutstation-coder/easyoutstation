<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Full bleed background for maskable -->
  <rect width="64" height="64" fill="#1e3a5f"/>
  <!-- Car icon scaled to safe zone (centered, ~80% of size) -->
  <g transform="translate(7, 18) scale(0.78)">
    <!-- Car body -->
    <rect x="2" y="14" width="40" height="12" rx="3" fill="#2563eb"/>
    <!-- Car roof -->
    <path d="M10 14 L14 6 L30 6 L34 14 Z" fill="#3b82f6"/>
    <!-- Wheels -->
    <circle cx="11" cy="26" r="5" fill="#1e3a5f"/>
    <circle cx="11" cy="26" r="3" fill="#94a3b8"/>
    <circle cx="33" cy="26" r="5" fill="#1e3a5f"/>
    <circle cx="33" cy="26" r="3" fill="#94a3b8"/>
    <!-- Windows -->
    <rect x="15" y="7.5" width="6" height="5" rx="1" fill="#bfdbfe"/>
    <rect x="23" y="7.5" width="6" height="5" rx="1" fill="#bfdbfe"/>
  </g>
</svg>
