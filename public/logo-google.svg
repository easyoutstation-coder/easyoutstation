<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&amp;display=swap');
    </style>
  </defs>

  <!-- White background -->
  <rect width="800" height="800" fill="#ffffff"/>

  <!-- Blue icon box — matches navbar exactly -->
  <rect x="270" y="130" width="260" height="260" rx="40" fill="#2563eb"/>

  <!-- Car icon (Lucide-style, white) centered in blue box -->
  <!-- Car body -->
  <rect x="300" y="295" width="200" height="70" rx="14" fill="#ffffff"/>
  <!-- Car roof -->
  <path d="M338 295 Q345 248 368 242 L432 242 Q455 248 462 295Z" fill="#ffffff"/>
  <!-- Windshield tint -->
  <path d="M346 290 Q349 258 368 253 L432 253 Q451 258 454 290Z" fill="#93c5fd"/>
  <!-- Wheels -->
  <circle cx="340" cy="368" r="24" fill="#1d4ed8"/>
  <circle cx="340" cy="368" r="13" fill="#ffffff" opacity="0.25"/>
  <circle cx="460" cy="368" r="24" fill="#1d4ed8"/>
  <circle cx="460" cy="368" r="13" fill="#ffffff" opacity="0.25"/>
  <!-- Headlight -->
  <rect x="300" y="307" width="22" height="14" rx="4" fill="#bfdbfe"/>
  <!-- Tail light -->
  <rect x="478" y="307" width="22" height="14" rx="4" fill="#fcd34d"/>

  <!-- Route dots below car — subtle brand element -->
  <circle cx="310" cy="420" r="5" fill="#60a5fa"/>
  <line x1="320" y1="420" x2="478" y2="420" stroke="#93c5fd" stroke-width="2.5" stroke-dasharray="8 6"/>
  <circle cx="488" cy="420" r="5" fill="#f59e0b"/>

  <!-- Brand name — DM Serif Display, matches site headings -->
  <text
    x="400" y="560"
    font-family="'DM Serif Display', Georgia, serif"
    font-size="72"
    font-weight="400"
    fill="#0f172a"
    text-anchor="middle"
    letter-spacing="-1"
  >EasyOutstation</text>

  <!-- Divider -->
  <rect x="310" y="578" width="180" height="2" rx="1" fill="#2563eb" opacity="0.3"/>

  <!-- Tagline — matches footer subtitle style -->
  <text
    x="400" y="628"
    font-family="Arial, Helvetica, sans-serif"
    font-size="22"
    fill="#2563eb"
    text-anchor="middle"
    letter-spacing="5"
    font-weight="600"
  >PREMIUM CAB SERVICE</text>

  <!-- Location tag -->
  <text
    x="400" y="668"
    font-family="Arial, Helvetica, sans-serif"
    font-size="17"
    fill="#94a3b8"
    text-anchor="middle"
    letter-spacing="3"
  >DELHI NCR</text>
</svg>
